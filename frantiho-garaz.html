.scene.visible{opacity:1}

.bottom-zone{
  margin-top:auto;width:100%;
  padding:12px 12px 16px;
  background:linear-gradient(0deg, rgba(30,22,14,0.82) 0%, rgba(30,22,14,0.6) 70%, transparent 100%);
  position:relative;z-index:10;
}
.row3{
  display:grid;grid-template-columns:1fr 1.6fr 1fr;
  gap:10px;max-width:680px;margin:0 auto;align-items:start;
}
.col-stats{display:flex;flex-direction:column;gap:6px}
.stat-pill{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:14px;
  background:rgba(255,255,255,0.13);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);
}
.stat-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.stat-dot.g{background:#4CAF50}.stat-dot.b{background:#42A5F5}
.stat-v{font-family:'Lilita One',cursive;font-size:20px;color:#fff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.stat-l{font-size:9px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase}
.stat-info{display:flex;flex-direction:column}
.lvl-badge{text-align:center;padding:8px 10px;border-radius:16px;background:linear-gradient(135deg,rgba(255,140,66,0.25),rgba(255,107,61,0.15));border:1.5px solid rgba(255,140,66,0.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.lvl-badge .lvl-num{font-family:'Lilita One',cursive;font-size:32px;color:#FFB830;text-shadow:0 2px 6px rgba(0,0,0,0.4);line-height:1}
.lvl-badge .lvl-txt{font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase}

.col-math{display:flex;flex-direction:column;align-items:center;gap:8px}
.gtag{display:inline-block;background:linear-gradient(135deg,#FF8C42,#FF6B3D);color:#fff;font-size:10px;font-weight:800;padding:3px 14px;border-radius:20px;letter-spacing:1.5px;box-shadow:0 2px 8px rgba(255,107,61,0.4)}
.math-area{display:flex;align-items:center;justify-content:center;gap:6px}
.num-bub{
  width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;font-size:34px;color:#fff;
  text-shadow:0 2px 0 rgba(0,0,0,0.15);
  box-shadow:0 4px 14px rgba(0,0,0,0.25),inset 0 -4px 0 rgba(0,0,0,0.12),inset 0 2px 0 rgba(255,255,255,0.25);
  position:relative;transition:transform 0.3s;
}
.num-bub::after{content:'';position:absolute;top:7px;left:12px;width:16px;height:9px;border-radius:50%;background:rgba(255,255,255,0.3);transform:rotate(-20deg)}
.nb1{background:linear-gradient(145deg,#FF7043,#E64A19)}
.nb2{background:linear-gradient(145deg,#42A5F5,#1976D2)}
.op-b{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Lilita One',cursive;font-size:24px;color:#fff;background:linear-gradient(145deg,#FFB830,#F2A630);box-shadow:0 3px 10px rgba(242,166,48,0.4),inset 0 -3px 0 rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.3)}
.eq-b{font-family:'Lilita One',cursive;font-size:28px;color:rgba(255,255,255,0.4)}
.q-bub{
  width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;font-size:32px;color:#fff;
  background:linear-gradient(145deg,#AB47BC,#7B1FA2);
  box-shadow:0 4px 14px rgba(123,31,162,0.35),inset 0 -4px 0 rgba(0,0,0,0.12),inset 0 2px 0 rgba(255,255,255,0.2);
  animation:pulse 2s ease-in-out infinite;position:relative;
}
.q-bub::after{content:'';position:absolute;top:7px;left:12px;width:16px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);transform:rotate(-20deg)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.inp-row{display:flex;align-items:center;justify-content:center;gap:8px}
.ans-f{width:84px;height:50px;border:3px solid rgba(255,255,255,0.25);border-radius:14px;background:rgba(255,255,255,0.12);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);font-family:'Lilita One',cursive;font-size:28px;color:#fff;text-align:center;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.ans-f:focus{border-color:#FFB830;box-shadow:0 0 0 4px rgba(255,184,48,0.2);background:rgba(255,255,255,0.18)}
.ans-f::placeholder{color:rgba(255,255,255,0.3);font-size:16px}
.btn-go{height:50px;padding:0 22px;border:none;border-radius:14px;background:linear-gradient(180deg,#66BB6A,#43A047);color:#fff;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 14px rgba(67,160,71,0.4),inset 0 -3px 0 rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.2);transition:transform 0.1s}
.btn-go:active{transform:translateY(2px)}

.fb{text-align:center;min-height:22px;font-size:14px;font-weight:800;transition:all 0.3s;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.fb.ok{color:#A5D6A7}.fb.no{color:#EF9A9A}.fb.idle{color:transparent}

.col-meter{display:flex;flex-direction:column;gap:6px}
.meter-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:14px;padding:8px 10px;border:1px solid rgba(255,255,255,0.12)}
.meter-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.meter-top .ml{font-size:10px;font-weight:700;color:rgba(255,255,255,0.55)}
.meter-top .mc{font-size:13px;font-weight:800;color:#FFB830;text-shadow:0 1px 2px rgba(0,0,0,0.4)}
.meter-bar{width:100%;height:12px;background:rgba(0,0,0,0.25);border-radius:7px;overflow:hidden}
.meter-fill{height:100%;border-radius:7px;transition:width 0.6s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,#FF8C42,#FFB830,#66BB6A);position:relative}
.meter-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:3px;background:rgba(255,255,255,0.3);border-radius:2px}
.drops{display:flex;gap:2px;margin-top:4px;justify-content:center;flex-wrap:wrap}
.drop-i{width:10px;height:14px;transition:all 0.3s}
.drop-i svg{width:100%;height:100%}
.drop-i.filled svg path{fill:#FFB830}
.drop-i.empty svg path{fill:rgba(255,255,255,0.12)}

.stars-card{background:rgba(255,255,255,0.08);border-radius:12px;padding:6px 8px;border:1px solid rgba(255,255,255,0.1);text-align:center;min-height:36px}
.stars-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.stars{display:flex;justify-content:center;gap:2px;flex-wrap:wrap}
.star-i{animation:pop 0.45s cubic-bezier(.17,.67,.35,1.5)}
@keyframes pop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0)}}

.shake{animation:shk 0.35s}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.num-correct{animation:numB 0.5s}
@keyframes numB{0%{transform:scale(1)}40%{transform:scale(1.2) rotate(-5deg)}70%{transform:scale(0.95) rotate(3deg)}100%{transform:scale(1) rotate(0)}}

/* ===== START SCREEN ===== */
.start-screen{
  position:fixed;inset:0;z-index:500;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
}
.start-screen.hidden{display:none}
.start-title{
  font-family:'Lilita One',cursive;font-size:42px;color:#FFB830;
  text-shadow:0 4px 16px rgba(0,0,0,0.5),0 0 60px rgba(255,184,48,0.2);
  text-align:center;line-height:1.2;
}
.start-sub{font-size:16px;color:rgba(255,255,255,0.5);font-weight:700;text-align:center}
.start-btn{
  padding:18px 50px;border:none;border-radius:20px;
  background:linear-gradient(180deg,#66BB6A,#43A047);
  color:#fff;font-family:'Lilita One',cursive;font-size:28px;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 24px rgba(67,160,71,0.5),inset 0 -4px 0 rgba(0,0,0,0.15),inset 0 2px 0 rgba(255,255,255,0.2);
  transition:transform 0.15s;
  animation:btnPulse 2s ease-in-out infinite;
}
.start-btn:hover{transform:scale(1.05)}
.start-btn:active{transform:scale(0.97)}
@keyframes btnPulse{0%,100%{box-shadow:0 6px 24px rgba(67,160,71,0.5),inset 0 -4px 0 rgba(0,0,0,0.15),inset 0 2px 0 rgba(255,255,255,0.2)}50%{box-shadow:0 8px 32px rgba(67,160,71,0.7),inset 0 -4px 0 rgba(0,0,0,0.15),inset 0 2px 0 rgba(255,255,255,0.2)}}

/* ===== VIDEO OVERLAYS ===== */
.vid-full{
  position:fixed;inset:0;z-index:400;
  background:#000;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;cursor:pointer;
}
.vid-full.show{display:flex}
.vid-full video{width:100%;height:100%;object-fit:cover}
.vid-full .v-txt{
  position:absolute;top:8%;left:50%;transform:translateX(-50%);
  font-family:'Lilita One',cursive;font-size:36px;color:#FFB830;
  text-shadow:0 3px 12px rgba(0,0,0,0.7),0 0 40px rgba(255,184,48,0.3);
  z-index:2;white-space:nowrap;
  animation:txtIn 0.6s cubic-bezier(.17,.67,.35,1.2);
}
@keyframes txtIn{0%{transform:translateX(-50%) scale(0);opacity:0}60%{transform:translateX(-50%) scale(1.1)}100%{transform:translateX(-50%) scale(1)}}
.vid-full .v-skip{
  position:absolute;bottom:6%;left:50%;transform:translateX(-50%);
  font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);
  z-index:2;letter-spacing:1px;
  animation:blink 1.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:0.9}}

/* OUTRO */
.outro-overlay{
  position:fixed;inset:0;z-index:450;
  background:#000;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;cursor:pointer;
}
.outro-overlay.show{display:flex}
.outro-overlay video{width:100%;height:100%;object-fit:cover}
.outro-msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Lilita One',cursive;font-size:42px;color:#FFB830;
  text-shadow:0 4px 16px rgba(0,0,0,0.7),0 0 60px rgba(255,184,48,0.3);
  z-index:2;text-align:center;line-height:1.3;
  animation:txtIn 0.8s cubic-bezier(.17,.67,.35,1.2);
  pointer-events:none;
}
.outro-sub{
  position:absolute;bottom:10%;left:50%;transform:translateX(-50%);
  font-size:16px;font-weight:700;color:rgba(255,255,255,0.5);z-index:2;pointer-events:none;
}

.confetti{position:fixed;pointer-events:none;z-index:150;left:50%;top:40%}
.conf-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:confFall 1.4s ease-out forwards}
@keyframes confFall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(140px) rotate(720deg) scale(0.2)}}

@media(max-width:560px){
  .row3{grid-template-columns:1fr;gap:8px}
  .col-stats{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px}
  .col-meter{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px}
  .meter-card,.stars-card{flex:1;min-width:120px}
  .lvl-badge{padding:6px 16px}.lvl-badge .lvl-num{font-size:24px}
  .start-title{font-size:30px}
  .start-btn{padding:14px 36px;font-size:22px}
}
@media(max-width:420px){
  .num-bub{width:50px;height:50px;font-size:28px}
  .q-bub{width:50px;height:50px;font-size:26px}
  .op-b{width:32px;height:32px;font-size:20px}
  .eq-b{font-size:22px}
  .ans-f{width:72px;height:44px;font-size:24px}
  .btn-go{height:44px;padding:0 16px;font-size:14px}
  .vid-full .v-txt{font-size:24px}
  .outro-msg{font-size:28px}
}
</style>
</head>
<body>

<!--
  ============================================================
  NASTAVENI VIDEI - ZMENTE CESTY K SOUBORUM PODLE POTREBY
  Vsechna videa ve stejne slozce jako tento HTML soubor.

    intro     = uvodni video (pred zacatkem hry)
    level_2   = video pri postupu na uroven 2
    level_3   = video pri postupu na uroven 3
    oil_done  = video pri dokonceni vymeny oleje
    outro     = zaverecne video (po dokonceni vsech urovni)
  ============================================================
-->

<!-- START SCREEN -->
<div class="start-screen" id="startScr">
  <div class="start-title">FRANTIHO<br>GARAZ!</div>
  <div class="start-sub">Pocitani do 20</div>
  <button class="start-btn" id="startBtn">START</button>
</div>

<!-- INTRO VIDEO -->
<div class="vid-full" id="introOvl">
  <video id="introVid" playsinline></video>
  <div class="v-skip">Klikni pro preskoceni</div>
</div>

<!-- GAME -->
<div class="scene" id="scene">
  <div class="bottom-zone">
    <div class="row3">
      <div class="col-stats">
        <div class="lvl-badge">
          <div class="lvl-txt">Uroven</div>
          <div class="lvl-num" id="lv">1</div>
        </div>
        <div class="stat-pill">
          <div class="stat-dot g">&#10003;</div>
          <div class="stat-info"><div class="stat-v" id="sc">0</div><div class="stat-l">Body</div></div>
        </div>
        <div class="stat-pill">
          <div class="stat-dot b">&#9889;</div>
          <div class="stat-info"><div class="stat-v" id="sr">0</div><div class="stat-l">V rade</div></div>
        </div>
      </div>
      <div class="col-math" id="board">
        <div class="gtag" id="tag">ZAKAZKA #1</div>
        <div class="math-area">
          <div class="num-bub nb1" id="nb1">3</div>
          <div class="op-b" id="op">+</div>
          <div class="num-bub nb2" id="nb2">4</div>
          <div class="eq-b">=</div>
          <div class="q-bub" id="qb">?</div>
        </div>
        <div class="inp-row">
          <input type="number" class="ans-f" id="ai" min="0" max="20" autocomplete="off" inputmode="numeric" placeholder="?">
          <button class="btn-go" id="btn">HOTOVO!</button>
        </div>
        <div class="fb idle" id="fb">&nbsp;</div>
      </div>
      <div class="col-meter">
        <div class="meter-card">
          <div class="meter-top"><span class="ml">Olej</span><span class="mc" id="ml">0/10</span></div>
          <div class="meter-bar"><div class="meter-fill" id="mf" style="width:0%"></div></div>
          <div class="drops" id="drops"></div>
        </div>
        <div class="stars-card">
          <div class="stars-lbl">Hvezdy</div>
          <div class="stars" id="strs"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LEVEL VIDEO -->
<div class="vid-full" id="lvlOvl">
  <div class="v-txt" id="lvlTxt">UROVEN SPLNENA!</div>
  <video id="lvlVid" playsinline></video>
  <div class="v-skip">Klikni pro pokracovani</div>
</div>

<!-- OUTRO -->
<div class="outro-overlay" id="outro">
  <video id="outroVid" playsinline></video>
  <div class="outro-msg" id="outroMsg">GRATULUJI!</div>
  <div class="outro-sub">Frantiho garaz ti dekuje!</div>
</div>

<script>
(function(){

  // ====================================================
  //  NASTAVENI VIDEI — zmente nazvy souboru dle potreby
  //  Vsechna videa ve stejne slozce jako HTML soubor.
  // ====================================================
  var VIDEOS = {
    intro:     "0.mp4",
    level_2:   "1.mp4",
    level_3:   "1.mp4",
    oil_done:  "1.mp4",
    outro:     "2.mp4"
  };
  // ====================================================

  var lv=1,sc=0,sr=0,tn=1,oil=0,blocked=true,gameOver=false;
  var MX=10,totalStars=0;
  var a,b,opr,ans;
  var $=function(id){return document.getElementById(id)};

  // ============ START SCREEN ============
  // Kliknuti na START = user gesture → prohlizec povoli zvuk
  $('startBtn').addEventListener('click',function(){
    $('startScr').classList.add('hidden');
    playIntro();
  });

  // ============ INTRO ============
  function playIntro(){
    var v=$('introVid');
    v.src=VIDEOS.intro;
    v.load();
    $('introOvl').classList.add('show');
    v.play().then(function(){}).catch(function(){
      endIntro();
    });
    v.onended=function(){endIntro()};
  }
  function endIntro(){
    $('introVid').pause();
    $('introOvl').classList.remove('show');
    $('scene').classList.add('visible');
    blocked=false;
    setTimeout(function(){$('ai').focus()},300);
  }
  $('introOvl').addEventListener('click',function(){endIntro()});

  // ============ DROPS ============
  var dropsEl=$('drops');
  for(var i=0;i<MX;i++){
    var d=document.createElement('div');d.className='drop-i empty';
    d.innerHTML='<svg viewBox="0 0 12 16"><path d="M6 0C6 0 0 8 0 11.5C0 14 2.69 16 6 16C9.31 16 12 14 12 11.5C12 8 6 0 6 0Z"/></svg>';
    dropsEl.appendChild(d);
  }
  function updateDrops(){var ds=dropsEl.querySelectorAll('.drop-i');for(var i=0;i<ds.length;i++){ds[i].className=i<oil?'drop-i filled':'drop-i empty'}}

  // ============ GAME LOGIC ============
  function gen(){
    if(lv===1){a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*Math.min(10,15-a))+1;opr='+';ans=a+b}
    else if(lv===2){var s=Math.floor(Math.random()*10)+5;b=Math.floor(Math.random()*(s-1))+1;a=s;opr='-';ans=a-b}
    else{if(Math.random()<0.5){a=Math.floor(Math.random()*12)+1;b=Math.floor(Math.random()*Math.min(10,20-a))+1;opr='+';ans=a+b}else{a=Math.floor(Math.random()*14)+6;b=Math.floor(Math.random()*(a-1))+1;opr='-';ans=a-b}}
    $('nb1').textContent=a;$('op').textContent=opr;$('nb2').textContent=b;
    $('tag').textContent='ZAKAZKA #'+tn;
    $('ai').value='';$('ai').focus();
    $('fb').className='fb idle';$('fb').innerHTML='\u00a0';
    $('qb').textContent='?';
  }
  function updOil(){$('mf').style.width=Math.min(100,(oil/MX)*100)+'%';$('ml').textContent=oil+'/'+MX;updateDrops()}

  function addStar(){
    totalStars++;
    var s=document.createElement('div');s.className='star-i';
    s.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24"><polygon points="12,1.5 15,8.5 22.5,9.2 17,14.2 18.5,21.5 12,17.8 5.5,21.5 7,14.2 1.5,9.2 9,8.5" fill="#FFB830" stroke="#E09520" stroke-width="0.6"/></svg>';
    $('strs').appendChild(s);
  }

  function confetti(){
    var c=document.createElement('div');c.className='confetti';
    var cols=['#FF6B3D','#FFB830','#4CAF50','#42A5F5','#AB47BC','#FF80AB','#FFD54F'];
    for(var i=0;i<24;i++){var p=document.createElement('div');p.className='conf-piece';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.left=(Math.random()*240-120)+'px';p.style.top=(Math.random()*40-20)+'px';p.style.animationDelay=(Math.random()*0.4)+'s';p.style.width=(5+Math.random()*7)+'px';p.style.height=(5+Math.random()*7)+'px';p.style.borderRadius=Math.random()>0.5?'50%':'2px';c.appendChild(p)}
    document.body.appendChild(c);setTimeout(function(){c.remove()},1800);
  }

  // ============ LEVEL VIDEO ============
  function showLevelVideo(msg,videoFile,onDone){
    blocked=true;
    $('lvlTxt').textContent=msg;
    var v=$('lvlVid');
    v.src=videoFile;
    v.load();
    $('lvlOvl').classList.add('show');
    v.play().catch(function(){});
    v.onended=function(){closeLevelVideo(onDone)};
  }
  function closeLevelVideo(onDone){
    $('lvlVid').pause();
    $('lvlOvl').classList.remove('show');
    blocked=false;
    if(onDone){onDone()}
    else{gen();setTimeout(function(){$('ai').focus()},100)}
  }
  $('lvlOvl').addEventListener('click',function(){closeLevelVideo(null)});

  // ============ OUTRO ============
  function showOutro(){
    gameOver=true;blocked=true;
    $('outroMsg').innerHTML='GRATULUJI!<br>'+totalStars+' HVEZD!';
    var v=$('outroVid');
    v.src=VIDEOS.outro;
    v.load();
    $('outro').classList.add('show');
    v.play().catch(function(){});
  }

  // ============ CHECK ANSWER ============
  var okMsg=['Motor bezi!','Presne!','Skvele!','Parada!','Super!','Bingo!','Vyborne!','Jede to!'];
  var noMsg=['Zkus znovu!','Jeste jednou!','Skoro!','Nevadi!'];

  function check(){
    if(blocked||gameOver)return;
    var v=parseInt($('ai').value);
    if(isNaN(v)){$('board').classList.add('shake');setTimeout(function(){$('board').classList.remove('shake')},400);return}
    if(v===ans){
      sc++;sr++;oil++;tn++;
      $('sc').textContent=sc;$('sr').textContent=sr;
      $('fb').className='fb ok';
      $('fb').textContent=okMsg[Math.floor(Math.random()*okMsg.length)];
      $('qb').textContent=ans;
      $('nb1').classList.add('num-correct');$('nb2').classList.add('num-correct');
      setTimeout(function(){$('nb1').classList.remove('num-correct');$('nb2').classList.remove('num-correct')},500);
      updOil();

      var shouldVideo=false,vidMsg='',vidFile='',isOutro=false;

      if(oil>=MX){
        addStar();confetti();oil=0;updOil();
        if(lv<3){
          lv++;$('lv').textContent=lv;
          vidMsg='UROVEN '+lv+'!';
          vidFile=lv===2?VIDEOS.level_2:VIDEOS.level_3;
          shouldVideo=true;
        } else {
          vidMsg='VYMENA HOTOVA!';
          vidFile=VIDEOS.oil_done;
          shouldVideo=true;
          isOutro=true;
        }
      }
      if(!shouldVideo && sc===5 && lv===1){
        lv=2;$('lv').textContent=lv;
        vidMsg='UROVEN 2!';vidFile=VIDEOS.level_2;shouldVideo=true;
      }
      if(!shouldVideo && sc===12 && lv===2){
        lv=3;$('lv').textContent=lv;
        vidMsg='UROVEN 3!';vidFile=VIDEOS.level_3;shouldVideo=true;
      }

      if(shouldVideo){
        if(isOutro){
          setTimeout(function(){
            showLevelVideo(vidMsg,vidFile,function(){
              setTimeout(showOutro,500);
            });
          },700);
        } else {
          setTimeout(function(){showLevelVideo(vidMsg,vidFile,null)},700);
        }
      } else {
        setTimeout(gen,1000);
      }
    } else {
      sr=0;$('sr').textContent=sr;
      $('fb').className='fb no';
      $('fb').textContent=noMsg[Math.floor(Math.random()*noMsg.length)];
      $('board').classList.add('shake');
      setTimeout(function(){$('board').classList.remove('shake')},400);
      $('ai').value='';$('ai').focus();
    }
  }

  $('btn').addEventListener('click',check);
  $('ai').addEventListener('keydown',function(e){if(e.key==='Enter')check()});
  gen();updOil();
})();
</script>
</body>
</html>
